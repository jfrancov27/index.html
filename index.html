<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeatSync Pro | School Play</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .seat { transition: all 0.2s ease; }
        .occupied { background-color: #ef4444 !important; cursor: not-allowed; opacity: 0.6; }
        .stage-glow { background: linear-gradient(180deg, rgba(168, 85, 247, 0.4) 0%, rgba(255,255,255,0) 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-purple-800 text-white p-4 shadow-xl sticky top-0 z-40">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-white text-purple-800 p-1 rounded-lg font-black">SS</div>
                <h1 class="text-xl font-bold tracking-tighter">SEATSYNC</h1>
            </div>
            <div class="flex gap-4 text-sm font-medium">
                <button onclick="showSection('booking')" class="opacity-90 hover:opacity-100">Reserve</button>
                <button onclick="showSection('admin')" class="bg-purple-600 px-3 py-1 rounded-md hover:bg-purple-500">Admin Panel</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">
        
        <section id="booking-section">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-black text-slate-800 mb-2">School Play 2026</h2>
                <p class="text-slate-500">Select a seat to view pricing and availability.</p>
            </div>

            <div class="max-w-xl mx-auto mb-12">
                <div class="w-full h-12 bg-slate-800 rounded-t-3xl flex items-center justify-center text-white text-xs tracking-[0.5em] font-bold shadow-2xl">STAGE</div>
                <div class="h-16 stage-glow w-full"></div>
            </div>

            <div class="bg-white p-6 md:p-10 rounded-3xl shadow-xl max-w-2xl mx-auto border border-slate-200">
                <div id="seating-grid" class="grid grid-cols-8 gap-3 justify-items-center">
                    </div>
            </div>
        </section>

        <section id="admin-section" class="hidden">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-3xl font-black">Financial Dashboard</h2>
                    <p class="text-slate-500">Real-time ticket sales tracking</p>
                </div>
                <button onclick="clearAllData()" class="text-xs text-red-500 font-bold border border-red-200 px-2 py-1 rounded hover:bg-red-50">RESET SYSTEM</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-purple-600">
                    <p class="text-slate-400 text-xs font-bold uppercase">Total Revenue</p>
                    <p class="text-4xl font-black text-purple-900">$<span id="report-revenue">0</span></p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-slate-800">
                    <p class="text-slate-400 text-xs font-bold uppercase">Seats Occupied</p>
                    <p class="text-4xl font-black" id="report-count">0</p>
                </div>
            </div>
        </section>
    </main>

    <div id="booking-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden">
            <div class="bg-purple-700 p-6 text-white text-center">
                <p class="text-purple-200 text-xs uppercase font-bold tracking-widest">Confirm Reservation</p>
                <h3 class="text-3xl font-black">Seat <span id="selected-seat-label"></span></h3>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">YOUR NAME</label>
                    <input type="text" id="user-name" placeholder="John Doe" class="w-full border-2 border-slate-100 rounded-xl p-3 focus:border-purple-500 outline-none transition-colors">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 mb-1">ADULTS ($10)</label>
                        <input type="number" id="adult-count" oninput="updateTotal()" min="0" value="1" class="w-full border-2 border-slate-100 rounded-xl p-3">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 mb-1">CHILDREN ($5)</label>
                        <input type="number" id="child-count" oninput="updateTotal()" min="0" value="0" class="w-full border-2 border-slate-100 rounded-xl p-3">
                    </div>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center">
                    <span class="font-bold text-slate-700">Total Due:</span>
                    <span class="text-2xl font-black text-purple-700">$<span id="live-total">10</span></span>
                </div>
                <button onclick="confirmBooking()" class="w-full bg-purple-600 text-white font-black py-4 rounded-2xl hover:bg-purple-700 shadow-lg shadow-purple-200 transition-all active:scale-95">CONFIRM BOOKING</button>
                <button onclick="closeModal()" class="w-full text-slate-400 text-sm font-medium">Changed my mind</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase code goes here (Same as previous step, but adding the 'name' field to addDoc)
        // ... (Refer to previous code for Firestore logic)
    </script>

    <script>
        function updateTotal() {
            const a = document.getElementById('adult-count').value || 0;
            const c = document.getElementById('child-count').value || 0;
            document.getElementById('live-total').innerText = (a * 10) + (c * 5);
        }
        
        // Modal and Section logic from previous step...
    </script>
</body>
</html>
