<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeatSync | Multi-Select</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .seat { transition: all 0.2s ease; cursor: pointer; }
        .seat:hover:not(.occupied) { transform: scale(1.05); }
        .occupied { background-color: #ef4444 !important; cursor: not-allowed; opacity: 0.6; }
        .selected { background-color: #a855f7 !important; color: white; ring: 4px solid #d8b4fe; }
        .stage-glow { background: linear-gradient(180deg, rgba(168, 85, 247, 0.3) 0%, rgba(255,255,255,0) 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-32">

    <nav class="bg-purple-800 text-white p-4 shadow-xl sticky top-0 z-40">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter">SEATSYNC</h1>
            <div class="flex gap-4 text-sm font-medium">
                <button id="nav-reserve" class="opacity-90 hover:opacity-100">Booking</button>
                <button id="nav-admin" class="bg-purple-700 px-3 py-1 rounded-md">Admin</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">
        
        <section id="booking-section">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-slate-800">Choose Your Seats</h2>
                <p class="text-slate-500">Select all the seats you'd like to purchase.</p>
            </div>

            <div class="max-w-md mx-auto mb-10">
                <div class="w-full h-8 bg-slate-800 rounded-t-2xl flex items-center justify-center text-white text-[10px] tracking-[0.4em] font-bold">STAGE</div>
                <div class="h-12 stage-glow w-full"></div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-xl max-w-2xl mx-auto border border-slate-200">
                <div id="seating-grid" class="grid grid-cols-8 gap-3 justify-items-center">
                    </div>
            </div>
        </section>

        <section id="admin-section" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">Admin Dashboard</h2>
                <button id="btn-reset" class="bg-red-50 text-red-600 text-xs font-bold px-3 py-1 rounded">Reset All</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-purple-600">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Total Revenue</p>
                    <p class="text-2xl font-black">$<span id="report-revenue">0</span></p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-slate-800">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Tickets Sold</p>
                    <p class="text-2xl font-black" id="report-count">0</p>
                </div>
            </div>
        </section>
    </main>

    <div id="purchase-bar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <p class="text-slate-500 text-xs font-bold uppercase">Selected Seats</p>
                <p id="selected-list-text" class="text-purple-700 font-black">-</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-slate-500 text-xs font-bold">TOTAL PRICE</p>
                    <p class="text-2xl font-black text-slate-900">$<span id="bar-total">0</span></p>
                </div>
                <button id="btn-checkout" class="bg-purple-600 text-white px-8 py-3 rounded-xl font-black hover:bg-purple-700 transition-all active:scale-95 shadow-lg shadow-purple-200">
                    PURCHASE NOW
                </button>
            </div>
        </div>
    </div>

    <div id="booking-modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden">
            <div class="bg-purple-700 p-6 text-white text-center">
                <h3 class="text-2xl font-black">Finalize Purchase</h3>
                <p class="text-purple-200 text-sm">You are booking <span id="modal-seat-count"></span> seats</p>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">YOUR NAME</label>
                    <input type="text" id="user-name" placeholder="Name" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-purple-500">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 mb-1">ADULT QTY</label>
                        <input type="number" id="adult-count" min="0" value="1" class="w-full border-2 border-slate-100 rounded-xl p-3">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 mb-1">CHILD QTY</label>
                        <input type="number" id="child-count" min="0" value="0" class="w-full border-2 border-slate-100 rounded-xl p-3">
                    </div>
                </div>
                <button id="btn-confirm" class="w-full bg-purple-600 text-white font-black py-4 rounded-2xl hover:bg-purple-700">PAY & CONFIRM</button>
                <button id="btn-cancel" class="w-full text-slate-400 text-sm font-medium">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- PASTE YOUR FIREBASE CONFIG HERE ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const bookingsRef = collection(db, "bookings");

        let selectedSeats = [];

        // UI Switches
        document.getElementById('nav-reserve').onclick = () => {
            document.getElementById('booking-section').classList.remove('hidden');
            document.getElementById('admin-section').classList.add('hidden');
        };
        document.getElementById('nav-admin').onclick = () => {
            document.getElementById('booking-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
        };

        // Real-time Data Sync
        onSnapshot(bookingsRef, (snapshot) => {
            const taken = [];
            let revenue = 0;
            snapshot.forEach(doc => {
                const data = doc.data();
                taken.push(data.seatId);
                revenue += (data.adults * 10) + (data.children * 5);
            });
            renderGrid(taken);
            document.getElementById('report-revenue').innerText = revenue;
            document.getElementById('report-count').innerText = taken.length;
        });

        function renderGrid(taken) {
            const grid = document.getElementById('seating-grid');
            grid.innerHTML = '';
            const rows = ['A', 'B', 'C', 'D', 'E'];
            
            rows.forEach(row => {
                for (let i = 1; i <= 8; i++) {
                    const id = `${row}${i}`;
                    const isOccupied = taken.includes(id);
                    const isSelected = selectedSeats.includes(id);

                    const seat = document.createElement('div');
                    seat.className = `seat w-10 h-10 rounded-md flex items-center justify-center text-[10px] font-bold 
                        ${isOccupied ? 'occupied text-white' : (isSelected ? 'selected' : 'bg-green-500 text-white')}`;
                    seat.innerText = id;

                    if(!isOccupied) {
                        seat.onclick = () => toggleSeat(id);
                    }
                    grid.appendChild(seat);
                }
            });
        }

        function toggleSeat(id) {
            if(selectedSeats.includes(id)) {
                selectedSeats = selectedSeats.filter(s => s !== id);
            } else {
                selectedSeats.push(id);
            }
            updatePurchaseBar();
            // Re-render only to update colors
            const snapshot = document.getElementById('report-count').innerText; // Tiny hack to trigger re-render
            renderGrid(Array.from(document.querySelectorAll('.occupied')).map(s => s.innerText));
        }

        function updatePurchaseBar() {
            const bar = document.getElementById('purchase-bar');
            if(selectedSeats.length > 0) {
                bar.classList.remove('hidden');
                document.getElementById('selected-list-text').innerText = selectedSeats.join(', ');
                document.getElementById('bar-total').innerText = selectedSeats.length * 10; // Basic preview
            } else {
                bar.classList.add('hidden');
            }
        }

        // Final Purchase Logic
        document.getElementById('btn-checkout').onclick = () => {
            document.getElementById('modal-seat-count').innerText = selectedSeats.length;
            document.getElementById('booking-modal').classList.remove('hidden');
        };

        document.getElementById('btn-cancel').onclick = () => {
            document.getElementById('booking-modal').classList.add('hidden');
        };

        document.getElementById('btn-confirm').onclick = async () => {
            const name = document.getElementById('user-name').value;
            const adults = parseInt(document.getElementById('adult-count').value) || 0;
            const children = parseInt(document.getElementById('child-count').value) || 0;

            if(!name) return alert("Please enter your name!");
            if(adults + children !== selectedSeats.length) {
                return alert(`Wait! You selected ${selectedSeats.length} seats but only assigned ${adults + children} tickets.`);
            }

            try {
                // Save each seat as a separate booking
                for(let seat of selectedSeats) {
                    await addDoc(bookingsRef, {
                        seatId: seat,
                        userName: name,
                        adults: (adults > 0 ? 1 : 0), // Simplifying for multi-save
                        children: (adults > 0 ? 0 : 1),
                        timestamp: new Date()
                    });
                    // Note: This is a simple version. In a pro app, you'd decrement the counts.
                }
                alert("Tickets Booked Successfully!");
                selectedSeats = [];
                updatePurchaseBar();
                document.getElementById('booking-modal').classList.add('hidden');
            } catch (err) {
                alert("Something went wrong. Make sure your Firebase Config is correct!");
            }
        };

        document.getElementById('btn-reset').onclick = async () => {
            if(confirm("Delete all bookings?")) {
                const snap = await getDocs(bookingsRef);
                snap.forEach(async d => await deleteDoc(doc(db, "bookings", d.id)));
            }
        };
    </script>
</body>
</html>
